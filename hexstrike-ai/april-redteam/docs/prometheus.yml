# ─────────────────────────────────────────────────────────────
# prometheus.yml — Red Team Stack Metrics Collection
# Grafana reads from this Prometheus instance
# ─────────────────────────────────────────────────────────────

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

  external_labels:
    stack: 'april-redteam-2026'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:

  # ── Prometheus self-monitoring ────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── HexStrike AI metrics ──────────────────────────────────
  - job_name: 'hexstrike'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['hexstrike:8888']
    scrape_interval: 10s

  # ── Kali MCP metrics ─────────────────────────────────────
  - job_name: 'kali-mcp'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['kali-mcp:8000']
    scrape_interval: 30s

  # ── Redis metrics (via redis_exporter) ────────────────────
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 15s

  # ── Docker daemon metrics ─────────────────────────────────
  - job_name: 'docker'
    static_configs:
      - targets: ['host.docker.internal:9323']
    scrape_interval: 30s
